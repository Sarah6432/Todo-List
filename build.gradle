plugins {
    id 'java'
    id 'application'
}

group = 'com.sarah'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

application {
     mainClass = 'Main.java'
}

test {
    useJUnitPlatform()
}